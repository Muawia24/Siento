{% extends "layout.html" %}

{% block title %}Home - Mood Tracker{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="text-4xl font-bold mb-4">Welcome to Mood Tracker</h1>
    <p class="text-xl mb-8">Track your mood and improve your mental well-being.</p>
    {% if not current_user.is_authenticated %}
        <div class="space-x-4">
            <a href="{{ url_for('login') }}" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
                Login
            </a>
            <a href="{{ url_for('register') }}" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
                Register
            </a>
        </div>
    {% else %}
        <a href="{{ url_for('dashboard') }}" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded">
            Go to Dashboard
        </a>
    {% endif %}
</div>
{% endblock %}
